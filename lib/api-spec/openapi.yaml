components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Customer ──────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean
        openingBalance:
          type: number
        totalDebt:
          type: number
        totalPaid:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - isActive
        - openingBalance
        - totalDebt
        - totalPaid
        - createdAt
        - updatedAt

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        openingBalance:
          type: number
      required:
        - name

    UpdateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean

    # ── Supplier ───────────────────────────────────────────────────────────────
    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean
        openingBalance:
          type: number
        totalDebt:
          type: number
        totalPaid:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - isActive
        - openingBalance
        - totalDebt
        - totalPaid
        - createdAt
        - updatedAt

    CreateSupplierBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        openingBalance:
          type: number
      required:
        - name

    UpdateSupplierBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        phone2:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean

    # ── Material ───────────────────────────────────────────────────────────────
    Material:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: ["string", "null"]
        purchasePrice:
          type: number
        salePrice:
          type: ["number", "null"]
        profitMargin:
          type: ["number", "null"]
        profit:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        bricksPerPallet:
          type: ["integer", "null"]
        itemType:
          type: string
          enum: [buy, sell, both]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - purchasePrice
        - itemType
        - isActive
        - createdAt
        - updatedAt

    CreateMaterialBody:
      type: object
      properties:
        name:
          type: string
        unit:
          type: ["string", "null"]
        purchasePrice:
          type: number
        salePrice:
          type: ["number", "null"]
        profitMargin:
          type: ["number", "null"]
        profit:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        bricksPerPallet:
          type: ["integer", "null"]
        itemType:
          type: string
          enum: [buy, sell, both]
        notes:
          type: ["string", "null"]
      required:
        - name

    UpdateMaterialBody:
      type: object
      properties:
        name:
          type: string
        unit:
          type: ["string", "null"]
        purchasePrice:
          type: number
        salePrice:
          type: ["number", "null"]
        profitMargin:
          type: ["number", "null"]
        profit:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        bricksPerPallet:
          type: ["integer", "null"]
        itemType:
          type: string
          enum: [buy, sell, both]
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean

    # ── Invoice Item (shared) ─────────────────────────────────────────────────
    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        materialId:
          type: ["integer", "null"]
        materialName:
          type: string
        quantity:
          type: number
        palletCount:
          type: ["number", "null"]
        bricksPerPallet:
          type: ["number", "null"]
        totalBricks:
          type: ["number", "null"]
        unitPrice:
          type: number
        total:
          type: number
        notes:
          type: ["string", "null"]
      required:
        - id
        - materialName
        - quantity
        - unitPrice
        - total

    InvoiceItemInput:
      type: object
      properties:
        materialId:
          type: ["integer", "null"]
        materialName:
          type: string
        quantity:
          type: number
        palletCount:
          type: ["number", "null"]
        bricksPerPallet:
          type: ["number", "null"]
        totalBricks:
          type: ["number", "null"]
        unitPrice:
          type: number
        notes:
          type: ["string", "null"]
      required:
        - materialName
        - quantity
        - unitPrice

    # ── Sales Invoice ─────────────────────────────────────────────────────────
    SalesInvoice:
      type: object
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        invoiceDate:
          type: string
        customerMobile:
          type: ["string", "null"]
        customerAddress:
          type: ["string", "null"]
        driver:
          type: ["string", "null"]
        driverMobile:
          type: ["string", "null"]
        vehicle:
          type: ["string", "null"]
        guarantorName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        subtotal:
          type: number
        discount:
          type: number
        total:
          type: number
        paidAmount:
          type: number
        remainingDebt:
          type: number
        previousDebt:
          type: number
        isDeleted:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - invoiceNumber
        - customerId
        - customerName
        - invoiceDate
        - subtotal
        - discount
        - total
        - paidAmount
        - remainingDebt
        - previousDebt
        - isDeleted
