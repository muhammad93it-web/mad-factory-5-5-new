            type: string
        - name: toDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Supplier account statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountStatement"

  /suppliers/{id}/opening-balance:
    post:
      operationId: setSupplierOpeningBalance
      tags: [suppliers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpeningBalanceBody"
      responses:
        "200":
          description: Updated

  # ── Materials ─────────────────────────────────────────────────────────────
  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          description: Filter by item type (buy returns buy+both, sell returns sell+both)
          schema:
            type: string
            enum: [buy, sell, both]
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [materials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaterialBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /materials/{id}:
    get:
      operationId: getMaterial
      tags: [materials]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
    patch:
      operationId: updateMaterial
      tags: [materials]
      parameters:
        - name: id
